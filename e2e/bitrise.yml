format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  test_dart:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/sample-apps-flutter-veggieseasons.git
    - COMMIT: 6210b5dff666ff15fabb66cbfbc51a2b53a3c511
    - FLUTTER_VERSION: 3.13.6
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - flutter-installer@0:
        run_if: "true"
        inputs:
        - is_update: "true"
        - version: $FLUTTER_VERSION
    - script:
        title: Install dependencies
        inputs:
        - content: |-
            set -ex
            flutter pub get
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"
    - script:
        title: Remove pub cache
        inputs:
        - content: |
            set -ex
            rm -rf ~/.pub-cache
    - git::git@github.com:bitrise-steplib/bitrise-step-restore-cache.git@main:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: |-
            {{ .OS }}-{{ .Arch }}-dart-cache-{{ checksum "pubspec.lock" }}
        - verbose: "true"
    - script:
        title: Check restored cache
        inputs:
        - content: |
            set -ex

            echo $BITRISE_CACHE_HIT
            if [ ! -d ~/.pub-cache ]; then
              echo "~/.pub-cache directory doesn't exist"
              exit 1
            fi
    - script:
        title: Install dependencies again
        inputs:
        - content: |-
            set -ex
            flutter pub get

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
        - commit: $COMMIT
